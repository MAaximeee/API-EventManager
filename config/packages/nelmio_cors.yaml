nelmio_cors:
  defaults:
    allow_credentials: true
    allow_origin: ['http://localhost:5173', 'http://localhost:5174', 'http://localhost:8081', 'http://10.0.2.2:8081']
    allow_headers: ['Content-Type', 'Authorization']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    max_age: 3600
  paths:
    '^/': ~